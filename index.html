  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>涓栫晫鏉畬缇庨樀瀹规寫鎴?/title>
  <style>
    :root {
      --bg: #071425;
      --bg2: #0d2342;
      --card: rgba(255,255,255,.09);
      --card2: rgba(255,255,255,.14);
      --line: rgba(255,255,255,.18);
      --text: #f7fbff;
      --muted: rgba(247,251,255,.68);
      --gold: #ffd36a;
      --green: #44e3a2;
      --red: #ff6f7d;
      --blue: #69b7ff;
      --purple: #c99cff;
      --shadow: 0 22px 60px rgba(0,0,0,.34);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 0%, rgba(53,146,255,.35), transparent 26%),
        radial-gradient(circle at 88% 8%, rgba(255,211,106,.26), transparent 24%),
        linear-gradient(135deg, #071425 0%, #0a1b31 58%, #0a2d28 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .app {
      min-height: calc(100vh - 46px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: rgba(7,20,37,.62);
      backdrop-filter: blur(14px);
    }

    .topbar {
      padding: 18px 18px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.09);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .demo-pill {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,211,106,.15);
      border: 1px solid rgba(255,211,106,.35);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
    }

    .screen { padding: 18px; display: none; }
    .screen.active { display: block; }

    .hero {
      min-height: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 18px;
    }

    .hero-card {
      padding: 20px 22px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 30% 10%, rgba(255,211,106,.26), transparent 26%),
        linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.13);
      position: relative;
      overflow: hidden;
    }

    .hero-card:after {
      content: "8-0";
      position: absolute;
      right: -6px;
      bottom: -22px;
      font-weight: 900;
      font-size: 102px;
      color: rgba(255,255,255,.07);
      letter-spacing: -8px;
    }

    .hero-title {
      font-size: 40px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -1.8px;
      margin: 6px 0 8px;
      position: relative;
      z-index: 1;
    }

    .home-title-card {
      min-height: 156px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .home-title-card .hero-title {
      white-space: nowrap;
      font-size: clamp(22px, 7vw, 36px);
      letter-spacing: -1px;
    }

    .hero-kicker {
      position: relative;
      z-index: 1;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,211,106,.16);
      border: 1px solid rgba(255,211,106,.24);
      color: #ffe08a;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .6px;
    }

    .hero-subtitle {
      margin: 0;
      color: rgba(255,255,255,.82);
      font-size: 20px;
      font-weight: 800;
      position: relative;
      z-index: 1;
    }

    .hero-sub {
      margin: 0;
      color: rgba(255,255,255,.78);
      line-height: 1.68;
      font-size: 15px;
      position: relative;
      z-index: 1;
    }

    .rules {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .rule {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.07);
      padding: 14px 12px;
      border-radius: 18px;
    }

    .rule b {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .rule span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .btn {
      width: 100%;
      border: none;
      color: #081421;
      background: linear-gradient(135deg, #ffe28a, #44e3a2);
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(68,227,162,.14);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.secondary {
      background: rgba(255,255,255,.1);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: none;
    }

    .btn.small {
      width: auto;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
    }

    .btn:active { transform: translateY(1px); }

    .section-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.5px;
    }

    .section-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .formation-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .formation-card {
      padding: 14px 12px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.07);
      cursor: pointer;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
    }

    .formation-card:active { transform: translateY(1px); }
    .formation-card strong { font-size: 21px; letter-spacing: -.5px; }
    .formation-card span { color: var(--muted); font-size: 12px; line-height: 1.4; }

    .draft-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .round-badge {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(105,183,255,.15);
      border: 1px solid rgba(105,183,255,.3);
      color: #a9d9ff;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .current-pick h2 {
      margin: 0;
      font-size: 21px;
    }

    .current-pick p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .pitch {
      position: relative;
      height: 420px;
      border-radius: 28px;
      overflow: hidden;
      margin: 14px 0 16px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px) 0 0 / 50% 100%,
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02)),
        #108c58;
      border: 2px solid rgba(255,255,255,.26);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.04);
    }

    .pitch:before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 108px;
      height: 108px;
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .pitch:after {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      border-top: 2px solid rgba(255,255,255,.22);
    }

    .slot {
      position: absolute;
      left: calc(var(--x) * 1%);
      top: calc(var(--y) * 1%);
      transform: translate(-50%, -50%);
      width: 68px;
      text-align: center;
      z-index: 2;
    }

    .slot.current .shirt {
      box-shadow: 0 0 0 3px rgba(255,211,106,.85), 0 12px 20px rgba(0,0,0,.28);
      transform: scale(1.05);
    }

    .shirt {
      width: 48px;
      height: 48px;
      margin: 0 auto 4px;
      border-radius: 18px;
      background: rgba(7,20,37,.78);
      border: 1px solid rgba(255,255,255,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(0,0,0,.18);
      transition: .18s;
    }

    .shirt img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .slot-name {
      width: 68px;
      min-height: 18px;
      padding: 2px 5px;
      border-radius: 999px;
      background: rgba(0,0,0,.38);
      color: #fff;
      font-size: 10px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(255,255,255,.12);
    }

    .candidate-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .player-card {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 11px;
      border-radius: 20px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.13);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .player-card:active { transform: translateY(1px); }
    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 19px;
      overflow: hidden;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.15);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: rgba(255,255,255,.8);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .avatar .fallback {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 14px;
    }

    .p-info {
      min-width: 0;
    }

    .p-name {
      font-size: 16px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p-meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .tag {
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      color: rgba(255,255,255,.76);
      font-size: 10px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .tag.good {
      background: rgba(68,227,162,.12);
      color: #9effd3;
      border-color: rgba(68,227,162,.22);
    }

    .tag.warn {
      background: rgba(255,211,106,.13);
      color: #ffe49b;
      border-color: rgba(255,211,106,.25);
    }

    .rating-box {
      min-width: 52px;
      text-align: center;
      padding: 8px 7px;
      border-radius: 16px;
      background: rgba(255,211,106,.16);
      border: 1px solid rgba(255,211,106,.24);
    }

    .rating-box b {
      display: block;
      color: var(--gold);
      font-size: 22px;
      line-height: 1;
    }

    .rating-box span {
      display: block;
      color: rgba(255,255,255,.62);
      font-size: 10px;
      margin-top: 3px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .toolbar .btn { flex: 1; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 12px 0 16px;
    }

    .metric {
      padding: 13px 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric b {
      display: block;
      margin-top: 3px;
      font-size: 22px;
      line-height: 1;
    }

    .squad-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0 16px;
    }

    .squad-item {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      min-width: 0;
    }

    .squad-item .mini {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,.1);
      flex: 0 0 auto;
    }

    .squad-item .mini img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .squad-item strong {
      display: block;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .squad-item span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      margin-top: 2px;
      white-space: nowrap;
    }

    .match-log {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 14px 0 16px;
    }

    .match-card {
      border-radius: 18px;
      padding: 13px 12px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .match-card .round {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .match-card strong {
      font-size: 15px;
    }

    .result-pill {
      padding: 7px 10px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 12px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.12);
    }

    .result-pill.win {
      color: #9effd3;
      background: rgba(68,227,162,.13);
      border-color: rgba(68,227,162,.25);
    }

    .result-pill.draw {
      color: #ffe49b;
      background: rgba(255,211,106,.12);
      border-color: rgba(255,211,106,.25);
    }

    .result-pill.lose {
      color: #ffb2ba;
      background: rgba(255,111,125,.12);
      border-color: rgba(255,111,125,.25);
    }


    .sim-loading {
      min-height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,211,106,.18), transparent 30%),
        rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      margin-top: 12px;
      padding: 26px 18px;
    }

    .sim-spinner {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,.14);
      border-top-color: var(--gold);
      animation: spin 1s linear infinite;
      box-shadow: 0 0 36px rgba(255,211,106,.15);
    }

    .sim-loading h2 {
      margin: 2px 0 0;
      font-size: 25px;
      letter-spacing: -.6px;
    }

    .sim-loading p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .final-card {
      padding: 22px;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,211,106,.28), transparent 28%),
        linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.06));
      margin-bottom: 14px;
      text-align: center;
    }

    .final-card.champion {
      background:
        radial-gradient(circle at 12% 0%, rgba(255,255,255,.3), transparent 20%),
        radial-gradient(circle at 90% 20%, rgba(255,211,106,.44), transparent 22%),
        linear-gradient(145deg, rgba(255,211,106,.22), rgba(68,227,162,.16), rgba(105,183,255,.16));
      border-color: rgba(255,211,106,.4);
    }

    .final-card h2 {
      margin: 0 0 8px;
      font-size: 31px;
      line-height: 1.05;
      letter-spacing: -1.2px;
    }

    .final-card p {
      margin: 0;
      color: rgba(255,255,255,.78);
      line-height: 1.58;
      font-size: 14px;
    }

    .sharebox {
      width: 100%;
      min-height: 118px;
      resize: none;
      border-radius: 18px;
      padding: 13px;
      background: rgba(0,0,0,.22);
      color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.12);
      font: 13px/1.55 -apple-system, BlinkMacSystemFont, "PingFang SC", Arial, sans-serif;
      outline: none;
    }

    .notice {
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 16px;
      color: rgba(255,255,255,.72);
      background: rgba(105,183,255,.09);
      border: 1px solid rgba(105,183,255,.15);
      font-size: 12px;
      line-height: 1.55;
    }



    .mode-card {
      margin: 12px 0 0;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.13);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .mode-card strong { display:block; font-size:14px; }
    .mode-card span { display:block; margin-top:3px; color:var(--muted); font-size:11px; line-height:1.35; }

    .switch { position: relative; width: 54px; height: 31px; flex: 0 0 auto; }
    .switch input { display: none; }
    .slider {
      position: absolute; inset: 0; cursor: pointer; border-radius: 999px;
      background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.16);
      transition: .2s;
    }
    .slider:before {
      content: ""; position: absolute; width: 25px; height: 25px; left: 3px; top: 2px;
      border-radius: 50%; background: rgba(255,255,255,.95); transition: .2s;
      box-shadow: 0 4px 12px rgba(0,0,0,.28);
    }
    .switch input:checked + .slider { background: rgba(68,227,162,.35); border-color: rgba(68,227,162,.45); }
    .switch input:checked + .slider:before { transform: translateX(22px); }

    .formation-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 0 0 12px;
    }

    .formation-tab {
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.78);
      border-radius: 999px;
      padding: 10px 8px;
      font-weight: 900;
      font-size: 12px;
      cursor: pointer;
    }

    .formation-tab.active {
      color: #081421;
      background: linear-gradient(135deg, #ffe28a, #44e3a2);
      border-color: rgba(255,255,255,.0);
    }

    .draft-tip {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,211,106,.12);
      border: 1px solid rgba(255,211,106,.2);
      color: rgba(255,255,255,.78);
      font-size: 12px;
      line-height: 1.5;
    }

    .slot.empty { cursor: pointer; }
    .slot.empty .shirt { background: rgba(255,255,255,.14); border-style: dashed; }
    .slot.filled .shirt { border-color: rgba(68,227,162,.35); }
    .slot.selected .shirt {
      box-shadow: 0 0 0 3px rgba(255,211,106,.9), 0 12px 20px rgba(0,0,0,.28);
      transform: scale(1.06);
    }

    .slot.quick-pop {
      animation: quickSlotPop .34s ease-out both;
    }

    .slot.quick-pop .shirt {
      box-shadow: 0 0 0 3px rgba(68,227,162,.75), 0 12px 26px rgba(68,227,162,.18);
    }

    @keyframes quickSlotPop {
      from { transform: translate(-50%, -50%) translateY(16px) scale(.86); opacity: .35; }
      62% { transform: translate(-50%, -50%) translateY(-8px) scale(1.06); opacity: 1; }
      to { transform: translate(-50%, -50%) translateY(0) scale(1); opacity: 1; }
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(7px);
      padding: 14px;
    }
    .modal-mask.active { display: flex; }

    .draft-modal {
      width: 100%;
      max-width: 492px;
      max-height: 86vh;
      overflow: auto;

function fit(player, pos) {
  const v = player.weights && player.weights[pos] ? Number(player.weights[pos]) : 0;
  if (v > 0) return v;
  if (pos === "LWB" && player.weights.LB) return Math.max(.72, player.weights.LB * .86);
  if (pos === "RWB" && player.weights.RB) return Math.max(.72, player.weights.RB * .86);
  if (pos === "LM" && player.weights.LW) return Math.max(.62, player.weights.LW * .78);
  if (pos === "RM" && player.weights.RW) return Math.max(.62, player.weights.RW * .78);
  return 0;
}

function fitText(v) {
  if (v >= .98) return "涓讳綅缃?;
  if (v >= .84) return "寮洪€傞厤";
  if (v >= .72) return "鍙涓?;
  if (v > 0) return "鍕夊己";
  return "涓嶉€傞厤";
}

function usedIds() {
  return new Set(state.picks.filter(Boolean).map(x => x.player.id));
}

function countryPickCount(country) {
  return state.picks.filter(x => x && x.player && x.player.country === country).length;
}

function canUseCountry(country) {
  return countryPickCount(country) < MAX_PLAYERS_PER_COUNTRY;
}

function eligiblePlayersForSlot(slot, country) {
  const used = usedIds();
  const countryOK = p => country ? p.country === country && canUseCountry(country) : canUseCountry(p.country);
  let pool = PLAYERS.filter(p => !used.has(p.id) && countryOK(p) && fit(p, slot.pos) >= .58);
  if (pool.length === 0) pool = PLAYERS.filter(p => !used.has(p.id) && countryOK(p) && fit(p, slot.pos) > 0);
  return pool.sort((a,b) => (b.rating * fit(b, slot.pos)) - (a.rating * fit(a, slot.pos)));
}

function getEligibleCountries(slot) {
  const map = new Map();
  eligiblePlayersForSlot(slot).forEach(p => {
    const arr = map.get(p.country) || [];
    arr.push(p);
    map.set(p.country, arr);
  });
  return Array.from(map.entries()).map(([country, players]) => {
    const avg = players.reduce((sum,p)=>sum + p.rating * fit(p, slot.pos), 0) / players.length;
    return { country, players, avg };
  });
}

function weightedCountry(items) {
  const weights = items.map(x => Math.pow(Math.max(1, x.avg - 58), 1.65) * Math.sqrt(x.players.length));
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  for (let i=0; i<items.length; i++) {
    r -= weights[i];
    if (r <= 0) return items[i];
  }
  return items[items.length - 1];
}

function playerAvatar(player, cls="") {

    const name = picked ? picked.player.name : slot.label;
    const shirt = picked
      ? `<img src="${picked.player.avatar}" alt="${picked.player.name}" onerror="this.style.display='none';this.parentElement.textContent='${slot.pos}'">`
      : slot.pos;
    const cls = `${picked ? "filled" : "empty"} ${isSelected ? "selected" : ""} ${i === state.quickAnimatingIndex ? "quick-pop" : ""}`;
    const click = interactive && !picked ? `onclick="selectDraftSlot(${i})"` : "";
    return `<div class="slot ${cls}" ${click} style="--x:${slot.x};--y:${slot.y}">
      <div class="shirt">${shirt}</div>
      <div class="slot-name">${name}</div>
    </div>`;
  }).join("");
}

  const titleEl = document.getElementById("teamListTitle");
  const btn = document.getElementById("rollBtn");
  const isReroll = !!state.rolledCountry;

  if (isReroll) {
    countries = countries.filter(x => x.country !== state.rolledCountry);
  }

  if (!countries.length) {
    if (isReroll) {

      if (state.rolledPlayers && state.rolledPlayers.length) renderRolledPlayers(slot);
    } else {

    }
    return;
  }

  if (isReroll) {
    const left = rerollsLeftForSlot(state.selectedSlotIndex);
    if (left <= 0) {
      updateRollButtonAfterResult(btn, state.selectedSlotIndex);
      return;
    }

  }

  btn.disabled = true;

  let tick = 0;

function tier(r) {
  if (r >= 96) return "T0";
  if (r >= 92) return "S";
  if (r >= 88) return "A+";
  if (r >= 84) return "A";
  if (r >= 80) return "B+";
  return "B";
}

function lineOf(pos) {
  if (pos === "GK") return "gk";
  if (["CB","LB","RB","LWB","RWB"].includes(pos)) return "def";
  if (["DM","CM","LM","RM","AM"].includes(pos)) return "mid";
  return "att";
}

function calcTeam() {
  const items = state.picks.filter(Boolean).map(p => {
    const adjusted = Math.round(p.player.rating * p.fit);
    return { ...p, adjusted, line: lineOf(p.slot.pos) };
  });
  const avg = items.reduce((a,b)=>a+b.adjusted,0) / items.length;
  const avgFit = items.reduce((a,b)=>a+b.fit,0) / items.length * 100;

  const byLine = { gk: [], def: [], mid: [], att: [] };
  items.forEach(i => byLine[i.line].push(i.adjusted));
  const average = arr => arr.length ? arr.reduce((a,b)=>a+b,0) / arr.length : 72;

  const gk = average(byLine.gk);
  const defense = average(byLine.def);
  const midfield = average(byLine.mid);
  const attack = average(byLine.att);

  const countryCount = {};
  items.forEach(i => countryCount[i.player.country] = (countryCount[i.player.country] || 0) + 1);
  const maxCountry = Math.max(...Object.values(countryCount));
  const countryBonus = Math.min(6, Math.max(0, maxCountry - 2) * 1.5);
  const spreadPenalty = Object.keys(countryCount).length >= 10 ? 1.5 : 0;

  let balance = 86;
  if (gk < 80) balance -= 6;
  if (defense < 82) balance -= 5;
  if (midfield < 82) balance -= 4;
  if (attack < 82) balance -= 4;
  if (avgFit < 82) balance -= 5;
  if (["532","541"].includes(state.formation.id)) balance += 2;
  balance = clamp(balance + countryBonus - spreadPenalty, 65, 96);

  const clutch = clamp((avg * .45 + Math.max(...items.map(i=>i.adjusted)) * .2 + gk * .15 + defense * .1 + attack * .1), 65, 99);
  const power = clamp(avg * .42 + attack * .12 + midfield * .12 + defense * .12 + gk * .1 + balance * .08 + clutch * .04, 60, 99);

  return { items, avg, avgFit, gk, defense, midfield, attack, balance, clutch, power, countries: countryCount };
}

function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function rnd(a,b){ return a + Math.random() * (b-a); }
function int(a,b){ return Math.floor(rnd(a,b+1)); }

function simulateTournament() {
  const t = calcTeam();
  const list = [];
  let points = 0;

  // 鍐犲啗闅惧害鍧囪　鐗堬細鍓嶅嚑杞笉鍐嶇畝鍗曟暣浣撳姞闅撅紝閬垮厤 90 鍒嗗乏鍙冲己闃靛棰戠箒鏃╂棭鐖嗗喎锛?
  // 鐪熸鎻愰珮闅惧害闆嗕腑鍦?8寮恒€佸崐鍐宠禌銆佸喅璧涳紝璁┾€滃ず鍐犻毦鈥濓紝鑰屼笉鏄€滃己闃熷鏄?2寮虹炕杞︹€濄€?
  const tournamentQuality = clamp(
    t.power * .62 + t.clutch * .10 + t.gk * .07 + t.defense * .07 + t.midfield * .07 + t.attack * .07,
    60,
    99
  );

  const getWeakLinePenalty = (stageWeight, phase) => {
    const early = phase === "early";
    const limit = early
      ? { gk: 82, defense: 82, midfield: 81, attack: 81, fit: 86 }
      : { gk: 88, defense: 88, midfield: 87, attack: 88, fit: 92 };
    let penalty = 0;
    if (t.gk < limit.gk) penalty += (limit.gk - t.gk) * (early ? .06 : .13);
    if (t.defense < limit.defense) penalty += (limit.defense - t.defense) * (early ? .07 : .14);
    if (t.midfield < limit.midfield) penalty += (limit.midfield - t.midfield) * (early ? .05 : .10);
    if (t.attack < limit.attack) penalty += (limit.attack - t.attack) * (early ? .04 : .08);
    penalty += Math.max(0, limit.fit - t.avgFit) * (early ? .025 : .06);
    return penalty * stageWeight;
  };

  const chanceFromEdge = (edge, minChance, maxChance, factor) => {
    return clamp(.5 + edge * (factor || .055), minChance, maxChance);
  };

  const applyStrongTeamFloor = (chance, floors) => {
    if (!floors) return chance;
    if (t.power >= 96 && floors.p96 != null) chance = Math.max(chance, floors.p96);
    else if (t.power >= 94 && floors.p94 != null) chance = Math.max(chance, floors.p94);
    else if (t.power >= 92 && floors.p92 != null) chance = Math.max(chance, floors.p92);
    else if (t.power >= 90 && floors.p90 != null) chance = Math.max(chance, floors.p90);
    return chance;
  };

  const playGroup = (name, diff, opponent, stageWeight, maxWinChance) => {
    const edge = tournamentQuality - diff - getWeakLinePenalty(stageWeight, "early");
    let winChance = chanceFromEdge(edge, .18, maxWinChance, .050);
    if (t.power >= 90) winChance = Math.max(winChance, .74);
    if (t.power >= 92) winChance = Math.max(winChance, .79);
    const drawChance = clamp(.21 - Math.max(0, winChance - .58) * .25, .06, .24);
    const r = Math.random();
    let outcome = "L";
    if (r < winChance) outcome = "W";
    else if (r < winChance + drawChance) outcome = "D";
    points += outcome === "W" ? 3 : outcome === "D" ? 1 : 0;
    const gfBase = outcome === "W" ? 2 : outcome === "D" ? 1 : 0;
    const gaBase = outcome === "L" ? 2 : outcome === "D" ? 1 : 0;
    list.push({ name, diff, type: "group", opponent, outcome, score: makeScore(outcome, gfBase, gaBase), pointsAfter: points });
  };

  const playKO = (name, diff, opponent, config) => {
    const phase = config.phase || "late";
    const edge = tournamentQuality - diff - (config.stageTax || 0) - getWeakLinePenalty(config.stageWeight || 1, phase);
    let winChance = chanceFromEdge(edge, config.minChance || .02, config.maxChance || .75, config.factor || .055);
    winChance = applyStrongTeamFloor(winChance, config.floors);
    const outcome = Math.random() < winChance ? "W" : "L";
    const gfBase = outcome === "W" ? 2 : 0;
    const gaBase = outcome === "L" ? 2 : 0;
    const match = { name, diff, type: "ko", opponent, outcome, score: makeScore(outcome, gfBase, gaBase), pointsAfter: points };
    list.push(match);
    return outcome;
  };

  playGroup("灏忕粍璧涚1杞?, 73, "绁炵榛戦┈", .25, .96);
  playGroup("灏忕粍璧涚2杞?, 78, "鍚岀粍鍔叉晫", .35, .94);
  playGroup("灏忕粍璧涚3杞?, 81, "鍑虹嚎鐢熸鎴樺鎵?, .45, .91);
  if (points < 4) return list;

  if (playKO("32寮?, 84, "灏忕粍绗簩/绗笁", {
    phase: "early",
    stageWeight: .45,
    stageTax: 0,
    minChance: .08,
    maxChance: .97,
    factor: .052,
    floors: { p90: .94, p92: .96, p94: .97, p96: .98 }
  }) === "L") return list;

  if (playKO("16寮?, 86.5, "浼犵粺寮洪槦", {
    phase: "early",
    stageWeight: .65,
    stageTax: .10,
    minChance: .06,
    maxChance: .91,
    factor: .052,
    floors: { p90: .86, p92: .89, p94: .92, p96: .94 }
  }) === "L") return list;

  if (playKO("8寮?, 91.5, "浜夊啝鐑棬", {
    phase: "late",
    stageWeight: 1.10,
    stageTax: .70,
    minChance: .05,
    maxChance: .66,
    factor: .052
  }) === "L") return list;

  const semi = playKO("鍗婂喅璧?, 93.5, "涓栫晫绾ц豹闂?, {
    phase: "late",
    stageWeight: 1.28,
    stageTax: 1.25,
    minChance: .04,
    maxChance: .52,
    factor: .050
  });
  if (semi === "W") {
    playKO("鍐宠禌", 96, "鍐犲啗鏈€缁堣€冮獙", {
      phase: "late",
      stageWeight: 1.55,
      stageTax: 1.80,
      minChance: .025,
      maxChance: .32,
      factor: .048
    });
  } else {
    playKO("瀛ｅ啗璧?, 89, "鍙︿竴鏀崐鍐宠禌璐熻€?, {
      phase: "late",
      stageWeight: 1.00,
      stageTax: .55,
      minChance: .05,
      maxChance: .74,
      factor: .052
    });
  }

  return list;
}

function makeScore(outcome, gfBase, gaBase) {
  if (outcome === "W") {
    const gf = clamp(int(gfBase, gfBase + 3), 1, 6);
    const ga = int(0, Math.min(2, gf - 1));
    return `${gf}-${ga}`;
  }
  if (outcome === "D") {
    const g = int(0,2);
    return `${g}-${g}`;
  }
  const ga = int(1,4);
  const gf = int(0, Math.max(0, ga - 1));
  return `${gf}-${ga}`;
}

async function submitResultScoreSilently() {
  if (!state.final) renderFinal();
  const item = state.final && state.final.resultCategory ? state.final.resultCategory : getResultCategoryFromMatches(state.matches, state.final);
  if (!item) return null;
  if (state.submittedResultScoreKeys[item.key]) return item;
  const payload = { outBizType: RESULT_SCORE_OUT_BIZ_TYPE, outBizNo: String(item.outBizNo), score: 10 };
  const c = getScoreClient();
  const attempts = [];
  if (c && c.addScore) attempts.push(function(){ return c.addScore(payload); });
  if (c && c.addScore) attempts.push(function(){ return c.addScore(RESULT_SCORE_OUT_BIZ_TYPE, String(item.outBizNo), 10); });
  if (c && c.submitScore) attempts.push(function(){ return c.submitScore(payload); });

function extractScoreCount(obj, depth) {
  depth = depth || 0;
  if (!obj || depth > 6) return null;
  const keys = ["scorePersonCount", "scoreUserCount", "ratingPersonCount", "personCount", "userCount", "participantCount"];
  if (typeof obj === "object" && !Array.isArray(obj)) {
    for (let i = 0; i < keys.length; i++) {
      const v = obj[keys[i]];
      if (typeof v === "number" && isFinite(v)) return v;
      if (typeof v === "string" && /^\d+$/.test(v)) return Number(v);
    }
  }
  if (Array.isArray(obj)) {
    for (let i = 0; i < obj.length; i++) {
      const v = extractScoreCount(obj[i], depth + 1);
      if (v !== null) return v;
    }
  } else if (typeof obj === "object") {
    const vals = Object.keys(obj).map(function(k){ return obj[k]; });
    for (let i = 0; i < vals.length; i++) {
      const v = extractScoreCount(vals[i], depth + 1);
      if (v !== null) return v;
    }
  }
  return null;
}

async function fetchScoreCount(item) {
  const payload = { outBizType: RESULT_SCORE_OUT_BIZ_TYPE, outBizNo: String(item.outBizNo) };
  const c = getScoreClient();
  const attempts = [];
  if (c && c.getScore) attempts.push(function(){ return c.getScore(payload); });
  if (c && c.getScoreInfo) attempts.push(function(){ return c.getScoreInfo(payload); });
  if (c && c.getScoreDetail) attempts.push(function(){ return c.getScoreDetail(payload); });
  if (c && c.queryScore) attempts.push(function(){ return c.queryScore(payload); });
  if (window.ColorboxAI && window.ColorboxAI.getScore) attempts.push(function(){ return window.ColorboxAI.getScore(payload); });
  for (let i = 0; i < attempts.length; i++) {
    try {
      const res = await attempts[i]();
      const count = extractScoreCount(res);
      if (count !== null) return count;
    } catch (e) {}
  }
  return 0;
}

function roundRectC(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  const chars = String(text || "").split("");
  let line = "";
  let lines = [];
  for (let i = 0; i < chars.length; i++) {
    const test = line + chars[i];
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = chars[i];
      if (maxLines && lines.length >= maxLines) break;
    } else {
      line = test;
    }
  }
  if ((!maxLines || lines.length < maxLines) && line) lines.push(line);
  if (maxLines && lines.length > maxLines) lines = lines.slice(0, maxLines);
  lines.forEach(function(l, idx) { ctx.fillText(l, x, y + idx * lineHeight); });
  return lines.length * lineHeight;
}

function dataURLToBlob(dataURL) {
  const arr = dataURL.split(",");
  const match = arr[0].match(/:(.*?);/);
  const mime = match ? match[1] : "image/png";
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while (n--) u8arr[n] = bstr.charCodeAt(n);
  return new Blob([u8arr], { type: mime });
}

function canvasToBlob(canvas, type, quality) {
  type = type || "image/png";
  quality = quality || 0.95;
  return new Promise(function(resolve, reject) {
    if (canvas.toBlob) {
      canvas.toBlob(function(blob) {
        if (blob) resolve(blob);
        else reject(new Error("canvas toBlob failed"));
      }, type, quality);
      return;
    }
    try { resolve(dataURLToBlob(canvas.toDataURL(type, quality))); }
    catch (e) { reject(e); }
  });
}

function makeUploadFile(blob, filename) {
  try { return new File([blob], filename, { type: blob.type || "image/png" }); }
  catch (e) {
    blob.name = filename;
    blob.fileName = filename;
    return blob;
  }
}

function normalizeUploadUrl(res) {
  const seen = [];
  const candidates = [];
  function collect(value) {
    if (!value) return;
    if (typeof value === "string") { candidates.push(value); return; }
    if (typeof value !== "object") return;
    if (seen.indexOf(value) >= 0) return;
    seen.push(value);
    ["url","ossUrl","fileUrl","imageUrl","downloadUrl","src","href"].forEach(function(key) {
      if (typeof value[key] === "string") candidates.push(value[key]);
    });
    try {
      if (value.res && value.res.requestUrls && typeof value.res.requestUrls[0] === "string") {
        candidates.push(value.res.requestUrls[0].split("?")[0]);
      }
    } catch (e) {}
    Object.keys(value).forEach(function(key) {
      try { collect(value[key]); } catch (e) {}
    });
  }
  collect(res);
  for (let i = 0; i < candidates.length; i++) {
    let url = String(candidates[i] || "").trim();
    if (!url) continue;
    if (url.indexOf("//") === 0) url = "https:" + url;
    if (/^https?:\/\//i.test(url)) return url;
    if (/^[a-zA-Z0-9.-]+\.(com|cn|net|oss|aliyuncs)\//i.test(url)) return "https://" + url;
  }
  return "";
}

function isValidImageUrl(url) {
  return typeof url === "string" && /^https?:\/\//i.test(url.trim());
}

async function tryUploadAttempt(method, run) {
  debugLog("upload_attempt_start", { method: method });
  try {
    const res = await run();
    const url = normalizeUploadUrl(res);
    debugLog("upload_attempt_result", { method: method, rawType: typeof res, normalizedUrl: url });
    if (isValidImageUrl(url)) return url;
    throw new Error("UPLOAD_RETURN_INVALID_URL");
  } catch (e) {
    debugLog("upload_attempt_failed", { method: method, error: (e && e.message) || String(e) });
    return "";
  }
}

    attempts.push(["ColorboxAI.oss.uploadFile:file", function(){ return c.oss.uploadFile(file); }]);
    attempts.push(["ColorboxAI.oss.uploadFile:file_filename", function(){ return c.oss.uploadFile(file, filename); }]);
    attempts.push(["ColorboxAI.oss.uploadFile:object", function(){ return c.oss.uploadFile({ file: file, filename: filename }); }]);
  }
  if (c.uploadFile) {
    attempts.push(["ColorboxAI.uploadFile:file", function(){ return c.uploadFile(file); }]);
    attempts.push(["ColorboxAI.uploadFile:object", function(){ return c.uploadFile({ file: file, filename: filename }); }]);
  }
  if (c.uploadImage) {
    attempts.push(["ColorboxAI.uploadImage:file", function(){ return c.uploadImage(file); }]);
    attempts.push(["ColorboxAI.uploadImage:object", function(){ return c.uploadImage({ file: file, filename: filename }); }]);
  }
  if (c.upload) {
    attempts.push(["ColorboxAI.upload:file", function(){ return c.upload(file); }]);
    attempts.push(["ColorboxAI.upload:blob_object", function(){ return c.upload({ blob: blob, filename: filename }); }]);
  }
  if (k && k.multipartUpload) {
    attempts.push(["KaleidoOSS.multipartUpload:name_file", function(){ return k.multipartUpload(filename, file); }]);
    attempts.push(["KaleidoOSS.multipartUpload:object", function(){ return k.multipartUpload({ file: file, filename: filename }); }]);
  }
  if (k && k.uploadFile) {
    attempts.push(["KaleidoOSS.uploadFile:file", function(){ return k.uploadFile(file); }]);
    attempts.push(["KaleidoOSS.uploadFile:object", function(){ return k.uploadFile({ file: file, filename: filename }); }]);
  }
  if (c.uploadBase64) {
    attempts.push(["ColorboxAI.uploadBase64:string", function(){ return c.uploadBase64(base64(), filename); }]);
    attempts.push(["ColorboxAI.uploadBase64:object", function(){ return c.uploadBase64({ base64: base64(), filename: filename }); }]);
  }
  if (c.uploadDataURL) {
    attempts.push(["ColorboxAI.uploadDataURL:string", function(){ return c.uploadDataURL(dataURL(), filename); }]);
    attempts.push(["ColorboxAI.uploadDataURL:object", function(){ return c.uploadDataURL({ dataURL: dataURL(), filename: filename }); }]);
  }
  attempts.push(["postMessage:HUPU_OSS_UPLOAD", function(){
    return new Promise(function(resolve, reject) {
      let done = false;
      function handler(evt) {
        const data = evt.data || {};
        if (data.type === "HUPU_OSS_UPLOAD_RESULT" || data.type === "HUPU_OSS_UPLOAD_DONE") {
          done = true;
          window.removeEventListener("message", handler);
          resolve(data);
        }
      }
      window.addEventListener("message", handler);
      try {
        window.parent.postMessage({ type: "HUPU_OSS_UPLOAD", filename: filename, dataURL: dataURL() }, "*");
      } catch (e) {
        window.removeEventListener("message", handler);
        reject(e);
        return;
      }
      setTimeout(function() {
        if (!done) {
          window.removeEventListener("message", handler);
          reject(new Error("postMessage upload timeout"));
        }
      }, 2000);
    });
  }]);

  for (let i = 0; i < attempts.length; i++) {
    const url = await tryUploadAttempt(attempts[i][0], attempts[i][1]);
    if (isValidImageUrl(url)) return url;
  }
  throw new Error("OSS_UPLOAD_UNAVAILABLE");
}

}

function buildPostContent(hasImage) {
  const finalData = state.final || {};

  const wins = typeof finalData.wins === "number" ? finalData.wins : 0;
  const draws = typeof finalData.draws === "number" ? finalData.draws : 0;

function buildInitialValue(imageUrl) {
  const validImageUrl = isValidImageUrl(imageUrl);
  const images = validImageUrl ? [imageUrl] : [];
  const data = {
    topicId: Number(POST_TOPIC_ID),
    topicName: POST_TOPIC_NAME,
    forumId: Number(POST_FORUM_ID),
    forumName: POST_FORUM_NAME,
    boardId: Number(POST_BOARD_ID),
    boardName: POST_BOARD_NAME,
    tagId: Number(POST_TAG_ID),
    tagName: POST_TAG_NAME,
    title: buildPostTitle(),
    content: buildPostContent(validImageUrl),
    imageList: images,
    images: images,
    pics: images,
    picList: images,
    imgList: images,
    imageUrls: images
  };
  return {
    syncPost: true,
    title: data.title,
    content: data.content,
    topicId: data.topicId,
    topicName: data.topicName,
    forumId: data.forumId,
    forumName: data.forumName,
    boardId: data.boardId,
    boardName: data.boardName,
    tagId: data.tagId,
    tagName: data.tagName,
    imageList: images,
    images: images,
    pics: images,
    picList: images,
    imgList: images,
    imageUrls: images,
    appJsonV3: { activeTab: "thread", data: data }
  };
}

function buildPostUrl(initialValue) {
  const images = Array.isArray(initialValue.imageList) ? initialValue.imageList.filter(isValidImageUrl) : [];
  const queryItems = [
    ["topicName", POST_TOPIC_NAME],
    ["topicId", POST_TOPIC_ID],
    ["forumName", POST_FORUM_NAME],
    ["forumId", POST_FORUM_ID],
    ["boardName", POST_BOARD_NAME],
    ["boardId", POST_BOARD_ID],
    ["tagName", POST_TAG_NAME],
    ["tagId", POST_TAG_ID],
    ["initialValue", JSON.stringify(initialValue)]
  ];
  if (images.length) {
    queryItems.push(["imageList", JSON.stringify(images)]);
    queryItems.push(["images", JSON.stringify(images)]);
    queryItems.push(["picList", JSON.stringify(images)]);
  }
  const query = queryItems.map(function(pair) {
    return pair[0] + "=" + encodeURIComponent(pair[1]);
  }).join("&");
  return "huputiyu://bbs/postImg?" + query;
}

function safeNavigate(url, target) {
  target = target || "_self";
  try {
    if (window.ColorboxAI && window.ColorboxAI.track) {
      window.ColorboxAI.track("h5_post_click", {
        hasColorboxAI: !!window.ColorboxAI,
        hasNavigateTo: !!(window.ColorboxAI && window.ColorboxAI.navigateTo),
        hasOpenUrl: !!(window.ColorboxAI && window.ColorboxAI.openUrl)
      });
    }
  } catch (e) {}
  if (window.ColorboxAI && window.ColorboxAI.navigateTo) {
    debugLog("navigate_post", { mode: "ColorboxAI.navigateTo" });
    return window.ColorboxAI.navigateTo(url);
  }
  if (window.ColorboxAI && window.ColorboxAI.openUrl) {
    debugLog("navigate_post", { mode: "ColorboxAI.openUrl" });
    return window.ColorboxAI.openUrl(url);
  }
  if (target === "_blank") {
    debugLog("navigate_post", { mode: "window.open" });
    return window.open(url, "_blank");
  }
  debugLog("navigate_post", { mode: "location.href" });
  window.location.href = url;
}

async function sharePoster(btn) {
  if (!state.final) {
    renderFinal();
  }
  const oldText = btn && btn.textContent ? btn.textContent : "涓€閿彂甯?;
  if (btn) {
    btn.disabled = true;
    btn.textContent = "姝ｅ湪鐢熸垚鍥剧墖...";
  }
  debugLog("share_start");
  let imageUrl = "";
  let uploadError = "";
  try {
    const canvas = await createPosterCanvas();
    window.__posterCanvas = canvas;
    debugLog("canvas_created", { width: canvas.width, height: canvas.height });
    const blob = await canvasToBlob(canvas, "image/png", 0.95);
    debugLog("blob_created", { size: blob.size, type: blob.type });
    if (btn) btn.textContent = "姝ｅ湪涓婁紶鍥剧墖...";
    debugLog("upload_start");
    imageUrl = await uploadToOSS(blob, "worldcup_draft_" + Date.now() + ".png");
    if (!isValidImageUrl(imageUrl)) throw new Error("OSS 杩斿洖鍊间笉鏄彲璁块棶鍥剧墖 URL");
    debugLog("upload_success", { imageUrl: imageUrl });
  } catch (e) {
    uploadError = (e && e.message) || String(e);
    debugLog("upload_failed", { error: uploadError });
    try { await copyDebugLogs(); } catch (copyError) {}
    imageUrl = "";
  }
  const hasImage = isValidImageUrl(imageUrl);
  if (!hasImage) {
    debugLog("fallback_text_post", { reason: uploadError || "NO_VALID_IMAGE_URL" });
  }
  const initialValue = buildInitialValue(imageUrl);
  const url = buildPostUrl(initialValue);
  if (btn) {
    btn.disabled = false;
    btn.textContent = oldText;
  }
  setTimeout(function() { safeNavigate(url); }, 260);
}
